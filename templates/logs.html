<!DOCTYPE html>
<div class="container">
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Logs</title>
</head>
<body>
    <h2>Access Logs</h2>

    <table border="1">
        <tr>
            <th>Evidence ID</th>
            <th>User</th>
            <th>Action</th>
            <th>Time</th>
            <th>Result</th>
        </tr>

        {% for log in logs %}
        <tr>
            <td>{{ log[1] }}</td>
            <td>{{ log[2] }}</td>
            <td>{{ log[3] }}</td>
            <td>{{ log[4] }}</td>
            <td>{{ log[5] }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/dashboard">Back</a>
</body>
</html>
</div>
